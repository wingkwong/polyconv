name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - core
          - json
          - cli
      dry_run:
        description: Pack only, without publishing
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @polyconv/${{ inputs.package }}
    runs-on: ubuntu-latest

    steps:
      - name: Check branch
        if: ${{ inputs.dry_run == false && github.ref != 'refs/heads/main' }}
        run: |
          echo "Publishing is only allowed from main."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Pack selected package
        run: pnpm --filter @polyconv/${{ inputs.package }} pack --pack-destination /tmp/polyconv-pack

      - name: Publish selected package
        if: ${{ inputs.dry_run == false }}
        working-directory: packages/${{ inputs.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks --provenance
